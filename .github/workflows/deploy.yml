name: Deploy to VPS
on:
  push:
    branches:
      - main
    paths-ignore:
      - "seeds.py"
      - "assets/**"
      - "**.md"
      - ".github/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/susmessagebot
            git pull origin main
            source venv/bin/activate
            pip install -r requirements-vps.txt -q
            sudo systemctl restart susmessagebot
            sleep 150
            curl --max-time 10 http://localhost:8001/health || exit 1
